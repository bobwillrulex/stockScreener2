<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anchored VWAP Stock Screener</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <section class="mb-4">
        <h1 class="display-6 fw-semibold">Russell 1000 Anchored VWAP Screener</h1>
        <p class="text-secondary mb-0">
          Find stocks currently trading near earnings-anchored or yearly anchored VWAP zones.
        </p>
      </section>

      <section class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-column flex-md-row gap-3 align-items-md-end">
          <div>
            <label for="threshold" class="form-label">Distance threshold</label>
            <input id="threshold" class="form-control" type="number" min="0" step="0.01" value="0.10">
          </div>
          <button id="run-scan" class="btn btn-primary">
            <span id="scan-spinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
            Run Scan
          </button>
          <span id="scan-status" class="text-secondary"></span>
        </div>
      </section>


      <section class="card shadow-sm mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold">Scan Database</span>
          <span id="new-ticker-count" class="badge text-bg-secondary">0 new tickers</span>
        </div>
        <div class="card-body">
          <p id="database-status" class="text-secondary mb-0">Run a scan to compare against the previously stored scan.</p>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-header d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center">
          <div>
            <span id="table-title" class="fw-semibold">Signals</span>
            <span id="result-count" class="badge text-bg-secondary ms-2">0 results</span>
          </div>
          <div class="btn-group" role="group" aria-label="Choose result list">
            <button id="show-signals" class="btn btn-primary btn-sm" type="button" data-result-view="signals">Signals</button>
            <button id="show-new-tickers" class="btn btn-outline-primary btn-sm" type="button" data-result-view="new">New Tickers</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-striped table-hover mb-0 align-middle">
            <thead>
              <tr>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="ticker">Ticker <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="company_name">Company <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="market_cap">Market Cap <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="near_earnings">Near Earnings VWAP <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="near_yearly">Near Yearly VWAP <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="distance_score">Distance Score <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="min_distance_earnings">Earnings Distance <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="min_distance_yearly">Yearly Distance <span class="sort-indicator" aria-hidden="true"></span></button></th>
                <th scope="col"><button class="btn btn-link p-0 fw-semibold text-decoration-none text-body" type="button" data-sort-key="last_price">Last Price <span class="sort-indicator" aria-hidden="true"></span></button></th>
              </tr>
            </thead>
            <tbody id="results-body">
              <tr>
                <td colspan="9" class="text-center text-secondary py-4">Click “Run Scan” to begin.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
