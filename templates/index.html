<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Anchored VWAP Stock Screener</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <section class="mb-4">
        <h1 class="display-6 fw-semibold">Russell 1000 Anchored VWAP Screener</h1>
        <p class="text-secondary mb-0">
          Find stocks currently trading near earnings-anchored or yearly anchored VWAP zones.
        </p>
      </section>

      <section class="card shadow-sm mb-4">
        <div class="card-body d-flex flex-column flex-md-row gap-3 align-items-md-end">
          <div>
            <label for="threshold" class="form-label">Distance threshold</label>
            <input id="threshold" class="form-control" type="number" min="0" step="0.01" value="0.10">
          </div>
          <button id="run-scan" class="btn btn-primary">
            <span id="scan-spinner" class="spinner-border spinner-border-sm me-2 d-none" aria-hidden="true"></span>
            Run Scan
          </button>
          <span id="scan-status" class="text-secondary"></span>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold">Signals</span>
          <span id="result-count" class="badge text-bg-secondary">0 results</span>
        </div>
        <div class="table-responsive">
          <table class="table table-striped table-hover mb-0 align-middle">
            <thead>
              <tr>
                <th>Ticker</th>
                <th>Near Earnings VWAP</th>
                <th>Near Yearly VWAP</th>
                <th>Distance Score</th>
                <th>Earnings Distance</th>
                <th>Yearly Distance</th>
                <th>Last Price</th>
              </tr>
            </thead>
            <tbody id="results-body">
              <tr>
                <td colspan="7" class="text-center text-secondary py-4">Click “Run Scan” to begin.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
